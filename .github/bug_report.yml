name: 🐛 Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please keep it concise and include only what's needed to reproduce the issue.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug in one or two sentences.
      placeholder: e.g. The sandbox crashes when loading a Lua module with cyclic dependencies.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: How to reproduce
      description: Provide the minimal steps to reproduce the issue.
      placeholder: |
        1. Initialize a Vital.sandbox instance with...
        2. Load the following script script...
        3. Run and observe...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
      placeholder: The module should load without crashing and return...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Share relevant version and platform details.
      placeholder: |
        - Vital.sandbox version/commit:
        - OS (Windows/Linux/macOS):
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots (optional)
      render: shell
      placeholder: Paste crash output, stack traces, or link to screenshots here.

  - type: textarea
    id: additional
    attributes:
      label: Additional context (optional)
      placeholder: Any other context, related issues, or minimal reproducible code snippets.

  - type: checkboxes
    id: checklist
    attributes:
      label: Before submitting
      options:
        - label: I have searched existing issues to make sure this isn't a duplicate
          required: true
        - label: I am using a supported version
          required: true
