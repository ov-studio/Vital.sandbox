name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Build: Windows ──────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install SCons
        run: pip install scons

      # ── Inject version from tag ─────────────────────────────────────────────
      - name: Inject version from tag
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3 | cut -d- -f1)
          LABEL=$(echo "$VERSION" | cut -s -d- -f2-)

          sed -i \
            -e "s/^#define VSDK_VERSION_MAJOR.*/#define VSDK_VERSION_MAJOR $MAJOR/" \
            -e "s/^#define VSDK_VERSION_MINOR.*/#define VSDK_VERSION_MINOR $MINOR/" \
            -e "s/^#define VSDK_VERSION_PATCH.*/#define VSDK_VERSION_PATCH $PATCH/" \
            -e "s/^#define VSDK_VERSION_LABEL.*/#define VSDK_VERSION_LABEL \"$LABEL\"/" \
            Vital.sandbox/Tool/version.h

          echo "Injected version: $MAJOR.$MINOR.$PATCH label=\"$LABEL\""

      # ── Restore caches (warmed from main via cache.yml) ─────────────────────
      - name: Restore Godot cache
        uses: actions/cache/restore@v4
        with:
          path: .godot
          key: godot-windows-${{ hashFiles('Vital.extension/Vendor/godot/gen/include/godot_cpp/core/version.hpp') }}
          restore-keys: godot-windows-

      - name: Restore godot-cpp cache
        uses: actions/cache/restore@v4
        with:
          path: |
            Vital.extension/Vendor/godot/bin
            Vital.extension/.build_godotcpp.debug
            Vital.extension/.build_godotcpp.release
          key: godot-cpp-windows-${{ hashFiles('Vital.extension/Vendor/godot/gen/include/godot_cpp/core/version.hpp') }}
          restore-keys: godot-cpp-windows-

      - name: Restore Conan cache
        uses: actions/cache/restore@v4
        with:
          path: C:\Users\runneradmin\.conan2
          key: conan-windows-${{ hashFiles('Vital.sandbox/conanfile.*') }}
          restore-keys: conan-windows-

      - name: Restore Discord SDK cache
        uses: actions/cache/restore@v4
        with:
          path: Vital.sandbox/Vendor/discord-sdk
          key: discord-sdk-windows-${{ hashFiles('Vital.sandbox/Bootstrap/discord.py') }}
          restore-keys: discord-sdk-windows-

      # ── Build ───────────────────────────────────────────────────────────────
      - name: Build Release
        env:
          PYTHONUNBUFFERED: "1"
          CL: /MP
          CONAN_CPU_COUNT: "4"
          CMAKE_BUILD_PARALLEL_LEVEL: "4"
          GODOT_RENDERING_DRIVER: "null"
          GODOT_AUDIO_DRIVER: "Dummy"
        run: python build.py --all --release --verbose

      - name: Verify Release output
        shell: bash
        run: |
          found=$(find .dist/release -name "*.exe" -o -name "*.x86_64" -o -name "*.app" 2>/dev/null | head -1)
          if [ -z "$found" ]; then
            echo "ERROR: Release export produced no output files"
            exit 1
          fi
          echo "Release output verified: $found"

      # ── Upload ──────────────────────────────────────────────────────────────
      - name: Debug dist contents
        shell: bash
        run: |
          echo "=== .dist/release contents ==="
          find .dist/release/ -type f | sort || echo "ERROR: .dist/release is empty or missing"

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist-windows
          path: .dist/release/
          if-no-files-found: error


  # ── Build: Linux ────────────────────────────────────────────────────────────
  # TODO: re-enable once Windows is confirmed working
  # build-linux:
  #   ...


  # ── Build: macOS ────────────────────────────────────────────────────────────
  # TODO: re-enable once Windows is confirmed working
  # build-macos:
  #   ...


  # ── Release: Collect & Publish ──────────────────────────────────────────────
  release:
    needs: [build-windows]
    runs-on: ubuntu-latest

    steps:
      - name: Download all dist artifacts
        uses: actions/download-artifact@v4
        with:
          path: collected/

      - name: Package artifacts
        run: |
          TAG="${{ github.ref_name }}"
          if [ ! -d "collected" ] || [ -z "$(ls -A collected 2>/dev/null)" ]; then
            echo "ERROR: No artifacts were downloaded"
            exit 1
          fi
          cd collected
          for platform_dir in dist-windows dist-linux dist-macos; do
            platform="${platform_dir#dist-}"
            [ ! -d "$platform_dir" ] && continue
            for target_dir in "$platform_dir"/*/; do
              target=$(basename "$target_dir")
              zip_name="../Vital.sandbox-${TAG}-${platform}-${target}.zip"
              (cd "$target_dir" && zip -r "$(realpath "$zip_name")" .)
              echo "Packaged: $(basename $zip_name)"
            done
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:               ${{ github.ref_name }}
          name:                   ${{ github.ref_name }}
          generate_release_notes: true
          draft:                  false
          prerelease:             ${{ contains(github.ref_name, '-') }}
          files: "*.zip"