  # ── Release: Collect & Publish ──────────────────────────────────────────────
  release:
    needs: [build-windows]
    runs-on: ubuntu-latest

    steps:
      - name: Download all dist artifacts
        uses: actions/download-artifact@v4
        with:
          path: collected/

      - name: Package artifacts
        run: |
          TAG="${{ github.ref_name }}"
          if [ ! -d "collected" ] || [ -z "$(ls -A collected 2>/dev/null)" ]; then
            echo "ERROR: No artifacts were downloaded"
            exit 1
          fi
          cd collected
          for platform_dir in dist-windows dist-linux dist-macos; do
            platform="${platform_dir#dist-}"
            [ ! -d "$platform_dir" ] && continue
            for target_dir in "$platform_dir"/*/; do
              target=$(basename "$target_dir")
              zip_name="../Vital.sandbox-${TAG}-${platform}-${target}.zip"
              # zip contents directly, not the folder itself
              (cd "$target_dir" && zip -r "$(realpath "$zip_name")" .)
              echo "Packaged: $(basename $zip_name)"
            done
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:               ${{ github.ref_name }}
          name:                   ${{ github.ref_name }}
          generate_release_notes: true
          draft:                  false
          prerelease:             false
          files: "*.zip"