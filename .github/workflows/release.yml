name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install SCons
        run: pip install scons

      - name: Debug Conan install
        shell: cmd
        run: |
          pip install conan
          cd Vital.sandbox
          conan profile detect --force
          conan install . --build=missing -v --settings=compiler.version=194 --settings=compiler.cppstd=17 --settings:build=compiler.version=194 --settings:build=compiler.cppstd=17