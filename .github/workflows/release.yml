name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Build: Windows ──────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install SCons
        run: pip install scons

      # ── Restore caches ──────────────────────────────────────────────────────
      - name: Restore Godot cache
        id: cache-godot
        uses: actions/cache/restore@v4
        with:
          path: .godot
          key: godot-windows-${{ hashFiles('Vital.extension/Vendor/godot/version.py') }}

      - name: Restore Conan cache
        id: cache-conan
        uses: actions/cache/restore@v4
        with:
          path: ~/.conan2
          key: conan-windows-${{ hashFiles('Vital.extension/conanfile.*') }}
          restore-keys: conan-windows-

      - name: Restore vcpkg cache
        id: cache-vcpkg
        uses: actions/cache/restore@v4
        with:
          path: .vcpkg
          key: vcpkg-windows-${{ hashFiles('Vital.extension/vcpkg.json') }}
          restore-keys: vcpkg-windows-

      - name: Restore Discord SDK cache
        id: cache-discord
        uses: actions/cache/restore@v4
        with:
          path: Vital.sandbox/Vendor/discord-sdk
          key: discord-sdk-windows

      # ── Build ───────────────────────────────────────────────────────────────
      - name: Build Debug
        env:
          PYTHONUNBUFFERED: "1"
          CL: /MP
          CONAN_CPU_COUNT: "4"
          CMAKE_BUILD_PARALLEL_LEVEL: "4"
        run: python build.py --all --debug --verbose

      - name: Build Release
        env:
          PYTHONUNBUFFERED: "1"
          CL: /MP
          CONAN_CPU_COUNT: "4"
          CMAKE_BUILD_PARALLEL_LEVEL: "4"
        run: python build.py --all --release --verbose --skip-extension

      # ── Save caches (always, even on failure) ───────────────────────────────
      - name: Save Godot cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .godot
          key: godot-windows-${{ hashFiles('Vital.extension/Vendor/godot/version.py') }}

      - name: Save Conan cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.conan2
          key: conan-windows-${{ hashFiles('Vital.extension/conanfile.*') }}

      - name: Save vcpkg cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .vcpkg
          key: vcpkg-windows-${{ hashFiles('Vital.extension/vcpkg.json') }}

      - name: Save Discord SDK cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: Vital.sandbox/Vendor/discord-sdk
          key: discord-sdk-windows

      # ── Upload ──────────────────────────────────────────────────────────────
      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist-windows
          path: .dist/


