name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ── Build: Windows ──────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install SCons
        run: pip install scons

      - name: Cache Godot
        uses: actions/cache@v4
        with:
          path: .godot
          key: godot-windows-${{ hashFiles('Vital.extension/Vendor/godot/version.py') }}

      - name: Build Debug
        run: python build.py --all --debug --verbose

      - name: Build Release
        run: python build.py --all --release --verbose

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist-windows
          path: .dist/


  # ── Build: Linux ────────────────────────────────────────────────────────────
  # TODO: re-enable once Windows is confirmed working
  # build-linux:
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #       with: { fetch-depth: 0, submodules: recursive }
  #     - uses: actions/setup-python@v5
  #       with: { python-version: "3.x" }
  #     - run: sudo apt-get update && sudo apt-get install -y scons gcc g++ libssl-dev
  #     - uses: actions/cache@v4
  #       with: { path: .godot, key: "godot-linux-${{ hashFiles('Vital.extension/Vendor/godot/version.py') }}" }
  #     - run: python3 build.py --all --debug
  #     - run: python3 build.py --all --release --skip-extension
  #     - uses: actions/upload-artifact@v4
  #       with: { name: dist-linux, path: .dist/ }


  # ── Build: macOS ────────────────────────────────────────────────────────────
  # TODO: re-enable once Windows is confirmed working
  # build-macos:
  #   runs-on: macos-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #       with: { fetch-depth: 0, submodules: recursive }
  #     - uses: actions/setup-python@v5
  #       with: { python-version: "3.x" }
  #     - run: pip install scons
  #     - uses: actions/cache@v4
  #       with: { path: .godot, key: "godot-macos-${{ hashFiles('Vital.extension/Vendor/godot/version.py') }}" }
  #     - run: python3 build.py --all --debug
  #     - run: python3 build.py --all --release --skip-extension
  #     - uses: actions/upload-artifact@v4
  #       with: { name: dist-macos, path: .dist/ }


  # ── Release: Collect & Publish ──────────────────────────────────────────────
  release:
    needs: [build-windows]
    runs-on: ubuntu-latest

    steps:
      - name: Download all dist artifacts
        uses: actions/download-artifact@v4
        with:
          path: collected/

      - name: Package artifacts
        run: |
          TAG="${{ github.ref_name }}"
          cd collected
          for platform_dir in dist-windows dist-linux dist-macos; do
            platform="${platform_dir#dist-}"
            [ ! -d "$platform_dir" ] && continue
            for build_type in debug release; do
              [ ! -d "$platform_dir/$build_type" ] && continue
              for target_dir in "$platform_dir/$build_type"/*/; do
                target=$(basename "$target_dir")
                zip_name="../Vital.sandbox-${TAG}-${platform}-${target}-${build_type}.zip"
                zip -r "$zip_name" "$target_dir"
                echo "Packaged: $(basename $zip_name)"
              done
            done
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:               ${{ github.ref_name }}
          name:                   ${{ github.ref_name }}
          generate_release_notes: true
          draft:                  false
          prerelease:             false
          files: "*.zip"