name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Build: Windows ──────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install SCons
        run: pip install scons

      # ── Restore caches ──────────────────────────────────────────────────────
      - name: Restore Godot cache
        uses: actions/cache/restore@v4
        with:
          path: .godot
          key: godot-windows-${{ hashFiles('Vital.extension/Vendor/godot/gen/include/godot_cpp/core/version.hpp') }}-${{ github.run_id }}
          restore-keys: |
            godot-windows-${{ hashFiles('Vital.extension/Vendor/godot/gen/include/godot_cpp/core/version.hpp') }}-
            godot-windows-

      - name: Restore godot-cpp cache
        uses: actions/cache/restore@v4
        with:
          path: |
            Vital.extension/Vendor/godot/bin
            Vital.extension/.build_godotcpp.debug
            Vital.extension/.build_godotcpp.release
          key: godot-cpp-windows-${{ hashFiles('Vital.extension/Vendor/godot/gen/include/godot_cpp/core/version.hpp') }}-${{ github.run_id }}
          restore-keys: |
            godot-cpp-windows-${{ hashFiles('Vital.extension/Vendor/godot/gen/include/godot_cpp/core/version.hpp') }}-
            godot-cpp-windows-

      - name: Restore Conan cache
        uses: actions/cache/restore@v4
        with:
          path: C:\Users\runneradmin\.conan2
          key: conan-windows-${{ hashFiles('Vital.sandbox/conanfile.*') }}-${{ github.run_id }}
          restore-keys: |
            conan-windows-${{ hashFiles('Vital.sandbox/conanfile.*') }}-
            conan-windows-

      - name: Restore Discord SDK cache
        uses: actions/cache/restore@v4
        with:
          path: Vital.sandbox/Vendor/discord-sdk
          key: discord-sdk-windows-${{ hashFiles('Vital.sandbox/Bootstrap/discord.py') }}
          restore-keys: discord-sdk-windows-

      # ── Build ───────────────────────────────────────────────────────────────
      - name: Build Release
        env:
          PYTHONUNBUFFERED: "1"
          CL: /MP
          CONAN_CPU_COUNT: "4"
          CMAKE_BUILD_PARALLEL_LEVEL: "4"
          GODOT_RENDERING_DRIVER: "null"
          GODOT_AUDIO_DRIVER: "Dummy"
        run: python build.py --all --release --verbose

      - name: Verify Release output
        shell: bash
        run: |
          found=$(find .dist/release -name "*.exe" -o -name "*.x86_64" -o -name "*.app" 2>/dev/null | head -1)
          if [ -z "$found" ]; then
            echo "ERROR: Release export produced no output files"
            exit 1
          fi
          echo "Release output verified: $found"

      # ── Save caches (always, even on failure) ───────────────────────────────
      - name: Save Godot cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .godot
          key: godot-windows-${{ hashFiles('Vital.extension/Vendor/godot/gen/include/godot_cpp/core/version.hpp') }}-${{ github.run_id }}

      - name: Save godot-cpp cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            Vital.extension/Vendor/godot/bin
            Vital.extension/.build_godotcpp.debug
            Vital.extension/.build_godotcpp.release
          key: godot-cpp-windows-${{ hashFiles('Vital.extension/Vendor/godot/gen/include/godot_cpp/core/version.hpp') }}-${{ github.run_id }}

      - name: Save Conan cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: C:\Users\runneradmin\.conan2
          key: conan-windows-${{ hashFiles('Vital.sandbox/conanfile.*') }}-${{ github.run_id }}

      - name: Save Discord SDK cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: Vital.sandbox/Vendor/discord-sdk
          key: discord-sdk-windows-${{ hashFiles('Vital.sandbox/Bootstrap/discord.py') }}

      # ── Upload ──────────────────────────────────────────────────────────────
      - name: Debug dist contents
        shell: bash
        run: |
          echo "=== .dist/release contents ==="
          find .dist/release/ -type f | sort || echo "ERROR: .dist/release is empty or missing"

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist-windows
          path: .dist/release/
          if-no-files-found: error


