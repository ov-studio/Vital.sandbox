name: Cache

on:
  push:
    branches:
      - main
    paths:
      - 'Vital.sandbox/conanfile.*'
      - 'Vital.sandbox/Bootstrap/discord.py'
      - 'Vital.sandbox/Vendor/godot-cpp/**'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Cache: Warm on dependency change (makes caches available to tag runs) ───
  warm-cache-windows:
    runs-on: windows-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install SCons
        run: pip install scons

      - name: Restore Godot cache
        uses: actions/cache/restore@v4
        with:
          path: .godot
          key: godot-windows-${{ hashFiles('Vital.sandbox/Vendor/godot-cpp/gen/include/godot_cpp/core/version.hpp') }}
          restore-keys: godot-windows-

      - name: Restore godot-cpp cache
        uses: actions/cache/restore@v4
        with:
          path: |
            Vital.sandbox/Vendor/godot-cpp/bin
            Vital.extension/.build_godotcpp.debug
            Vital.extension/.build_godotcpp.release
          key: godot-cpp-windows-${{ hashFiles('Vital.sandbox/Vendor/godot-cpp/gen/include/godot_cpp/core/version.hpp') }}
          restore-keys: godot-cpp-windows-

      - name: Restore Conan cache
        uses: actions/cache/restore@v4
        with:
          path: C:\Users\runneradmin\.conan2
          key: conan-windows-${{ hashFiles('Vital.sandbox/conanfile.*') }}
          restore-keys: conan-windows-

      - name: Restore Discord SDK cache
        uses: actions/cache/restore@v4
        with:
          path: Vital.sandbox/Vendor/discord-sdk
          key: discord-sdk-windows-${{ hashFiles('Vital.sandbox/Bootstrap/discord.py') }}
          restore-keys: discord-sdk-windows-

      - name: Warm caches via build
        env:
          PYTHONUNBUFFERED: "1"
          CL: /MP
          CONAN_CPU_COUNT: "4"
          CMAKE_BUILD_PARALLEL_LEVEL: "4"
          GODOT_RENDERING_DRIVER: "null"
          GODOT_AUDIO_DRIVER: "Dummy"
        run: python build.py --all --release --verbose

      - name: Save Godot cache
        if: success()
        uses: actions/cache/save@v4
        with:
          path: .godot
          key: godot-windows-${{ hashFiles('Vital.sandbox/Vendor/godot-cpp/gen/include/godot_cpp/core/version.hpp') }}

      - name: Save godot-cpp cache
        if: success()
        uses: actions/cache/save@v4
        with:
          path: |
            Vital.sandbox/Vendor/godot-cpp/bin
            Vital.extension/.build_godotcpp.debug
            Vital.extension/.build_godotcpp.release
          key: godot-cpp-windows-${{ hashFiles('Vital.sandbox/Vendor/godot-cpp/gen/include/godot_cpp/core/version.hpp') }}

      - name: Save Conan cache
        if: success()
        uses: actions/cache/save@v4
        with:
          path: C:\Users\runneradmin\.conan2
          key: conan-windows-${{ hashFiles('Vital.sandbox/conanfile.*') }}

      - name: Save Discord SDK cache
        if: success()
        uses: actions/cache/save@v4
        with:
          path: Vital.sandbox/Vendor/discord-sdk
          key: discord-sdk-windows-${{ hashFiles('Vital.sandbox/Bootstrap/discord.py') }}
