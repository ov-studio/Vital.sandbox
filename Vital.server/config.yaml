# =============================================================================
# Vital Sandbox - Server Configuration
# =============================================================================
# This file controls the server's network, HTTP, and social settings.
# Simply modify the values below and restart the server - no code changes needed!
# =============================================================================

# -----------------------------------------------------------------------------
# Server Identity
# -----------------------------------------------------------------------------
server:
  # The display name of your server (shown in client UI and Discord)
  name: "Vital Sandbox Server"
  
  # Server version identifier (for compatibility checks)
  version: "1.0.0"
  
  # Server description (optional, for client display)
  description: "A Vital Sandbox server"

# -----------------------------------------------------------------------------
# Network Configuration
# -----------------------------------------------------------------------------
network:
  # TCP port for ENet multiplayer server
  # Clients connect to this port
  # Default: 7777
  port: 7777
  
  # Maximum number of concurrent clients allowed
  # Default: 32
  max_peers: 32

# -----------------------------------------------------------------------------
# HTTP Asset Server Configuration
# -----------------------------------------------------------------------------
http:
  # Port for HTTP asset delivery server
  # Clients download assets (models, textures, etc.) from this port
  # Default: 7778
  port: 7778

# -----------------------------------------------------------------------------
# Community / Social Links
# -----------------------------------------------------------------------------
social:
  # Discord server invite link
  # Shown in client UI and used for join requests
  discord: ""
  
  # Website URL
  website: ""
